version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      noble:
        patterns: ['@noble/*']
      pulse-dev-tooling:
        patterns: ['turbo', 'tsup', 'vitest', 'typescript', '@types/*', '@biomejs/*', 'typedoc']
    ignore:
      # Keep major version bumps manual — they may require API changes.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
