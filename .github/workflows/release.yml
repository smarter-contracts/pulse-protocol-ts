name: Release

# Runs on every push to main. The Changesets action either:
#   (a) opens / updates a "Version Packages" PR if there are unreleased changesets, or
#   (b) publishes to npm and creates git tags when that PR is merged.
#
# Authentication: uses npm Trusted Publishing (OIDC) — no NPM_TOKEN secret required.
# Prerequisites:
#   - This GitHub repository must be registered as a trusted publisher on npmjs.com
#     for each @pulse-protocol/* package (Package Settings → Trusted Publishers).
#   - The repository must be public (npm OIDC requires a public repo).

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write        # to create git tags and push version commits
      pull-requests: write   # to open the Version Packages PR
      id-token: write        # to request an OIDC token for npm trusted publishing

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required for Changesets to determine what has changed.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NODE_AUTH_TOKEN is intentionally omitted — npm will use the OIDC token
          # granted by id-token: write above.
